apiVersion: apps/v1
kind: Deployment
metadata:
  name: netpulse
  labels:
    app: netpulse
spec:
  replicas: 3
  selector:
    matchLabels:
      app: netpulse
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: netpulse
    spec:
      containers:
      - name: netpulse
        image: ${DOCKER_USERNAME}/netpulse:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "500m"
            memory: "512Mi"
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        - name: ENABLE_CLUSTER
          value: "true"
        - name: RATE_LIMIT_WINDOW_MS
          value: "60000"
        - name: RATE_LIMIT_MAX_REQUESTS
          value: "100"
        - name: KEEP_ALIVE_TIMEOUT
          value: "65000"
        - name: HEADERS_TIMEOUT
          value: "66000"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
        volumeMounts:
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: logs
        persistentVolumeClaim:
          claimName: netpulse-logs-pvc
-apiVersion: v1
kind: Service
metadata:
  name: netpulse
spec:
  selector:
    app: netpulse
  ports:
  - port: 80
    targetPort: 3000
    name: http
  type: LoadBalancer
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: netpulse-logs-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard